<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#faf8f5">
  <title>Contact Verifier · Realtor &amp; Lawyer Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PapaParse for CSV -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --cream:#faf8f5; --warm:#f3ede4; --ink:#2a2218; --muted:#7a7060;
      --navy:#1b2b4b; --gold:#b8932f; --green:#2d7a4f; --red:#c0392b;
      --amber:#d4851a; --blue:#2563eb; --rule:rgba(42,34,24,.1);
      --radius:10px; --shadow:0 2px 16px rgba(42,34,24,.08);
    }
    html,body { height:100%; background:var(--cream); }
    body { font-family:'Sora',sans-serif; color:var(--ink); }
    #root { min-height:100vh; }
    button,input,select,textarea { font-family:'Sora',sans-serif; }
    input:focus,select:focus,textarea:focus { outline:none; }

    @keyframes si   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.45} }

    .si   { animation:si   .38s cubic-bezier(.16,1,.3,1) both; }
    .spin { animation:spin 1s linear infinite; }
    .pulse{ animation:pulse 1.6s ease-in-out infinite; }

    /* ── Layout ── */
    .app { min-height:100vh; display:flex; flex-direction:column; }
    .topbar { background:var(--navy); color:#fff; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
    .topbar-brand { font-family:'DM Serif Display',serif; font-size:1.3rem; display:flex; align-items:center; gap:10px; }
    .topbar-sub { font-size:.72rem; opacity:.5; letter-spacing:.15em; text-transform:uppercase; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .main { flex:1; max-width:1300px; margin:0 auto; width:100%; padding:28px 20px 60px; }

    /* ── Cards ── */
    .card { background:#fff; border:1px solid var(--rule); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; margin-bottom:20px; }
    .card-title { font-family:'DM Serif Display',serif; font-size:1.15rem; color:var(--navy); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .card-title span { font-size:1.1em; }

    /* ── Buttons ── */
    .btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:6px; font-size:.82rem; font-weight:600; letter-spacing:.03em; cursor:pointer; border:none; transition:all .18s; }
    .btn-primary { background:var(--navy); color:#fff; }
    .btn-primary:hover { background:#253860; }
    .btn-success { background:var(--green); color:#fff; }
    .btn-success:hover { background:#236040; }
    .btn-danger  { background:var(--red); color:#fff; }
    .btn-danger:hover  { background:#a32d22; }
    .btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--rule); }
    .btn-ghost:hover   { border-color:#aaa; color:var(--ink); }
    .btn-gold    { background:var(--gold); color:#fff; }
    .btn-gold:hover    { background:#a07c28; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }

    /* ── Setup Wizard ── */
    .wizard { max-width:560px; margin:60px auto; }
    .wizard-step { font-size:.72rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .wizard-title { font-family:'DM Serif Display',serif; font-size:2rem; color:var(--navy); margin-bottom:6px; }
    .wizard-sub { font-size:.88rem; color:var(--muted); line-height:1.6; margin-bottom:28px; }
    .wiz-field { margin-bottom:14px; }
    .wiz-field label { display:block; font-size:.75rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .wiz-field input { width:100%; padding:11px 14px; border:1px solid var(--rule); border-radius:6px; font-size:.9rem; background:var(--cream); color:var(--ink); transition:border-color .18s; }
    .wiz-field input:focus { border-color:var(--navy); }
    .wiz-note  { font-size:.78rem; color:var(--muted); margin-top:16px; line-height:1.6; background:var(--warm); padding:12px 14px; border-radius:6px; }
    .wiz-note a { color:var(--navy); }
    .progress-dots { display:flex; gap:6px; margin-bottom:24px; }
    .progress-dot  { width:8px; height:8px; border-radius:50%; background:var(--rule); transition:background .2s; }
    .progress-dot.active { background:var(--navy); }

    /* ── Upload Zone ── */
    .upload-zone { border:2px dashed var(--rule); border-radius:var(--radius); padding:36px 24px; text-align:center; cursor:pointer; transition:all .18s; background:var(--cream); }
    .upload-zone:hover,.upload-zone.dragover { border-color:var(--navy); background:var(--warm); }
    .upload-icon { font-size:2.4rem; margin-bottom:8px; }
    .upload-title { font-weight:600; font-size:.95rem; margin-bottom:4px; }
    .upload-hint  { font-size:.8rem; color:var(--muted); }

    /* ── Stats Bar ── */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:20px; }
    .stat-box  { background:#fff; border:1px solid var(--rule); border-radius:var(--radius); padding:16px 18px; text-align:center; }
    .stat-num  { font-family:'DM Serif Display',serif; font-size:2rem; color:var(--navy); line-height:1; }
    .stat-lbl  { font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
    .stat-box.green .stat-num { color:var(--green); }
    .stat-box.amber .stat-num { color:var(--amber); }
    .stat-box.red   .stat-num { color:var(--red); }

    /* ── Progress Bar ── */
    .prog-bar-wrap { background:var(--warm); border-radius:999px; height:8px; overflow:hidden; margin:10px 0; }
    .prog-bar      { height:100%; background:var(--navy); border-radius:999px; transition:width .3s; }
    .prog-bar.green{ background:var(--green); }

    /* ── Filters ── */
    .filter-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
    .filter-row input,.filter-row select { padding:8px 12px; border:1px solid var(--rule); border-radius:6px; font-size:.82rem; background:var(--cream); color:var(--ink); min-width:160px; }
    .filter-row input:focus,.filter-row select:focus { border-color:var(--navy); }

    /* ── Table ── */
    .tbl-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--rule); }
    table { width:100%; border-collapse:collapse; font-size:.82rem; }
    th { background:var(--warm); padding:10px 14px; text-align:left; font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--rule); white-space:nowrap; cursor:pointer; user-select:none; }
    th:hover { background:#ece5db; }
    td { padding:10px 14px; border-bottom:1px solid var(--rule); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--warm); }
    .td-name { font-weight:600; color:var(--navy); }
    .td-type { font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:4px; font-weight:600; }
    .td-type.realtor { background:#e8f0fe; color:#1d4ed8; }
    .td-type.lawyer  { background:#fef3c7; color:#92400e; }
    .td-muted { color:var(--muted); }
    .td-notes { max-width:160px; }
    .td-notes textarea { width:100%; border:1px solid transparent; border-radius:4px; background:transparent; font-size:.8rem; resize:none; padding:3px 6px; color:var(--ink); min-height:36px; }
    .td-notes textarea:focus { border-color:var(--rule); background:var(--cream); }

    /* ── Status Badge ── */
    .status-badge { display:inline-flex; align-items:center; gap:5px; font-size:.75rem; font-weight:600; padding:3px 10px; border-radius:999px; white-space:nowrap; }
    .status-badge.verified   { background:#d1fae5; color:#065f46; }
    .status-badge.outdated   { background:#fee2e2; color:#991b1b; }
    .status-badge.uncertain  { background:#fef3c7; color:#92400e; }
    .status-badge.pending    { background:#f3f4f6; color:#6b7280; }
    .status-badge.reviewed   { background:#ede9fe; color:#5b21b6; }

    /* ── Photo Cell ── */
    .photo-cell { width:44px; height:44px; border-radius:50%; overflow:hidden; border:2px solid var(--rule); background:var(--warm); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; color:var(--muted); flex-shrink:0; }
    .photo-cell img { width:100%; height:100%; object-fit:cover; }

    /* ── Detail Panel ── */
    .detail-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:flex-end; justify-content:center; padding:0; }
    @media(min-width:680px){ .detail-overlay{ align-items:center; padding:24px; } }
    .detail-panel { background:#fff; border-radius:var(--radius) var(--radius) 0 0; width:100%; max-width:620px; max-height:90vh; overflow-y:auto; padding:28px 24px; }
    @media(min-width:680px){ .detail-panel{ border-radius:var(--radius); } }
    .detail-head { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
    .detail-photo { width:72px; height:72px; border-radius:50%; overflow:hidden; border:3px solid var(--rule); background:var(--warm); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:700; color:var(--muted); flex-shrink:0; }
    .detail-photo img { width:100%; height:100%; object-fit:cover; }
    .detail-name { font-family:'DM Serif Display',serif; font-size:1.4rem; color:var(--navy); }
    .detail-role { font-size:.8rem; color:var(--muted); margin-top:2px; }
    .compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
    .compare-col h4 { font-size:.7rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--rule); }
    .compare-field { margin-bottom:10px; }
    .compare-field .cf-label { font-size:.7rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.08em; }
    .compare-field .cf-val   { font-size:.87rem; color:var(--ink); margin-top:2px; word-break:break-word; }
    .compare-field .cf-val.match   { color:var(--green); }
    .compare-field .cf-val.mismatch{ color:var(--red); }
    .compare-field .cf-val.unknown { color:var(--amber); }

    /* ── Notifications ── */
    .toast { position:fixed; bottom:24px; right:24px; background:var(--navy); color:#fff; padding:12px 18px; border-radius:8px; font-size:.84rem; font-weight:500; z-index:999; max-width:320px; box-shadow:0 4px 20px rgba(0,0,0,.25); animation:si .3s both; }
    .toast.success { background:var(--green); }
    .toast.error   { background:var(--red); }

    /* ── Empty State ── */
    .empty-state { text-align:center; padding:60px 24px; color:var(--muted); }
    .empty-icon  { font-size:3rem; margin-bottom:12px; opacity:.4; }
    .empty-title { font-size:1rem; font-weight:600; color:var(--ink); margin-bottom:6px; }
    .empty-sub   { font-size:.85rem; }

    /* ── Responsive ── */
    @media(max-width:700px) {
      .main { padding:16px 12px 60px; }
      .compare-grid { grid-template-columns:1fr; }
      th,td { padding:8px 10px; }
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .filter-row { gap:8px; }
      .filter-row input,.filter-row select { min-width:0; flex:1; }
    }

    /* ── Misc ── */
    .tag-row { display:flex; gap:6px; flex-wrap:wrap; }
    .tag     { font-size:.72rem; padding:2px 8px; border-radius:4px; background:var(--warm); color:var(--muted); font-weight:600; }
    .divider { border:none; border-top:1px solid var(--rule); margin:16px 0; }
    .lbl-sm  { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .inline-edit { background:transparent; border:none; border-bottom:1px dashed var(--rule); font-size:inherit; color:inherit; width:100%; }
    .inline-edit:focus { border-bottom-color:var(--navy); outline:none; }
    .badge-reviewed { background:#ede9fe; color:#5b21b6; font-size:.7rem; padding:2px 8px; border-radius:4px; font-weight:600; }
    .badge-actioned { background:#d1fae5; color:#065f46; font-size:.7rem; padding:2px 8px; border-radius:4px; font-weight:600; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ══════════════════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════════════════ */
const SERIF = "'DM Serif Display',Georgia,serif";

const SAMPLE_CONTACTS = [
  { name:"Sarah Johnson",    type:"realtor", phone:"312-555-0101", email:"sarah.johnson@realty.com",    address:"123 Main St, Chicago, IL 60601",    company:"Chicago Premier Realty",   license:"" },
  { name:"Michael Torres",   type:"lawyer",  phone:"312-555-0202", email:"m.torres@torreslaw.com",       address:"456 Oak Ave, Evanston, IL 60201",   company:"Torres Law Group",          license:"" },
  { name:"Jennifer Park",    type:"realtor", phone:"847-555-0303", email:"jpark@northshoreprops.net",    address:"789 Elm Blvd, Wilmette, IL 60091",  company:"North Shore Properties",    license:"" },
  { name:"David Chen",       type:"lawyer",  phone:"312-555-0404", email:"dchen@chenlegalservices.com",  address:"321 Lake St, Chicago, IL 60614",    company:"Chen Legal Services",       license:"" },
  { name:"Amanda Williams",  type:"realtor", phone:"847-555-0505", email:"awilliams@lakeforestlux.com",  address:"555 Forest Rd, Lake Forest, IL 60045", company:"Lake Forest Luxury Homes", license:"" },
  { name:"Robert Martinez",  type:"lawyer",  phone:"312-555-0606", email:"rmartinez@martinezlaw.net",   address:"100 N Clark, Chicago, IL 60602",    company:"Martinez & Associates",     license:"" },
];

const REQUIRED_COLS = ["name"];
const KNOWN_COLS    = ["name","type","phone","email","address","company","license","notes"];

// Basic email regex
const RE_EMAIL = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
// Basic phone: allows (xxx) xxx-xxxx, xxx-xxx-xxxx, xxx.xxx.xxxx, +1... etc
const RE_PHONE = /^\+?[\d\s().\-]{7,20}$/;
// Basic US address (has digits + street)
const RE_ADDR  = /\d+\s+\w/;

const FREE_EMAIL_DOMAINS = ["gmail.com","yahoo.com","hotmail.com","outlook.com","aol.com","icloud.com"];

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function mkId() {
  return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
}
function initials(name) {
  const parts = String(name||"").trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0]||"")+(parts[parts.length-1][0]||"");
  return (parts[0]||"").slice(0,2).toUpperCase();
}
function avatarColor(name) {
  const COLORS = ["#1b2b4b","#2d7a4f","#b8932f","#2563eb","#7c3aed","#0e7490","#c0392b","#d4851a"];
  let hash = 0;
  for (let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
  return COLORS[Math.abs(hash) % COLORS.length];
}
function normalizePhone(p) {
  return String(p||"").replace(/[^\d+]/g,"");
}
function fmtPhone(p) {
  const d = normalizePhone(p).replace(/^\+1/,"");
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  return p;
}

/* ══════════════════════════════════════════════════════════════
   VERIFICATION ENGINE
   Client-side heuristic checks (no backend needed for basic validation).
   For production, wire in an email verification API, phone lookup service,
   or address normalisation API of your choice.
══════════════════════════════════════════════════════════════ */
async function verifyContact(contact) {
  // Simulate a short async delay (0.4–1.5s) to mimic API calls
  await new Promise(r => setTimeout(r, 400 + Math.random()*1100));

  const results = { email:{}, phone:{}, address:{}, overall:"verified" };

  /* ── Email ── */
  const email = String(contact.email||"").trim().toLowerCase();
  if (!email) {
    results.email = { status:"uncertain", note:"No email provided" };
  } else if (!RE_EMAIL.test(email)) {
    results.email = { status:"outdated", note:"Invalid email format" };
  } else {
    const domain = email.split("@")[1];
    const isFree = FREE_EMAIL_DOMAINS.includes(domain);
    results.email = {
      status: isFree ? "uncertain" : "verified",
      note: isFree ? "Free email domain — may not be professional" : "Format valid · professional domain"
    };
  }

  /* ── Phone ── */
  const phone = String(contact.phone||"").trim();
  if (!phone) {
    results.phone = { status:"uncertain", note:"No phone provided" };
  } else if (!RE_PHONE.test(phone)) {
    results.phone = { status:"outdated", note:"Invalid phone format" };
  } else {
    const digits = normalizePhone(phone).replace(/^\+1/,"");
    if (digits.length === 10) {
      // Simple area code check (US only)
      const areaCode = parseInt(digits.slice(0,3),10);
      const invalidAreas = [0,1];
      if (invalidAreas.includes(Math.floor(areaCode/100))) {
        results.phone = { status:"outdated", note:"Suspicious area code" };
      } else {
        results.phone = { status:"verified", note:"Valid US format · " + fmtPhone(phone) };
      }
    } else {
      results.phone = { status:"uncertain", note:"Non-standard length — could be international" };
    }
  }

  /* ── Address ── */
  const addr = String(contact.address||"").trim();
  if (!addr) {
    results.address = { status:"uncertain", note:"No address provided" };
  } else if (!RE_ADDR.test(addr)) {
    results.address = { status:"outdated", note:"Address missing street number" };
  } else if (addr.length < 10) {
    results.address = { status:"uncertain", note:"Address seems incomplete" };
  } else {
    results.address = { status:"verified", note:"Format looks valid" };
  }

  /* ── Overall ── */
  const statuses = [results.email.status, results.phone.status, results.address.status];
  if (statuses.includes("outdated")) results.overall = "outdated";
  else if (statuses.includes("uncertain")) results.overall = "uncertain";
  else results.overall = "verified";

  /* ── Photo (avatar placeholder – in production, call LinkedIn or Google People API) ── */
  results.photoUrl  = null;   // null = use initials avatar
  results.photoSrc  = "Generated Avatar";
  // Deterministically "find" a photo for ~30% of contacts (demo behaviour)
  const seed = contact.name.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  if (seed % 3 === 0) {
    // Use DiceBear API for realistic placeholder photos (free, no-auth)
    results.photoUrl = `https://api.dicebear.com/7.x/personas/svg?seed=${encodeURIComponent(contact.name)}&backgroundColor=b6e3f4,c0aede,ffd5dc`;
    results.photoSrc = "Avatar (LinkedIn/Google photo lookup requires API key)";
  }

  return results;
}

/* ══════════════════════════════════════════════════════════════
   CSV HELPERS
══════════════════════════════════════════════════════════════ */
function exportCSV(contacts) {
  const cols = ["name","type","phone","email","address","company","license",
                "emailStatus","emailNote","phoneStatus","phoneNote","addressStatus","addressNote",
                "overallStatus","photoSrc","reviewed","actioned","notes"];
  const rows = [cols.join(",")];
  contacts.forEach(c => {
    const v = c.verification || {};
    const row = [
      c.name, c.type, c.phone, c.email, c.address, c.company, c.license,
      v.email?.status||"", v.email?.note||"",
      v.phone?.status||"", v.phone?.note||"",
      v.address?.status||"", v.address?.note||"",
      v.overall||"pending",
      v.photoSrc||"",
      c.reviewed?"yes":"no",
      c.actioned?"yes":"no",
      (c.notes||"").replace(/,/g,";").replace(/\n/g," ")
    ].map(s=>JSON.stringify(String(s||"")));
    rows.push(row.join(","));
  });
  const blob = new Blob([rows.join("\n")], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `contact-verification-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function downloadSampleCSV() {
  const header = "name,type,phone,email,address,company,license";
  const rows = SAMPLE_CONTACTS.map(c =>
    [c.name,c.type,c.phone,c.email,c.address,c.company,""].map(s=>JSON.stringify(s)).join(",")
  );
  const blob = new Blob([[header,...rows].join("\n")], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "sample-contacts.csv";
  a.click();
}

function parseCSV(text) {
  const result = Papa.parse(text.trim(), { header:true, skipEmptyLines:true, transformHeader:h=>h.trim().toLowerCase() });
  if (!result.data || !result.data.length) throw new Error("CSV has no rows.");
  const headers = result.meta.fields || [];
  if (!headers.includes("name")) throw new Error("CSV must have a 'name' column.");
  return result.data.map(row => {
    const c = {};
    KNOWN_COLS.forEach(k => { c[k] = String(row[k]||"").trim(); });
    // detect type
    if (!c.type) c.type = "realtor";
    if (!["realtor","lawyer"].includes(c.type.toLowerCase())) c.type = "realtor";
    else c.type = c.type.toLowerCase();
    c.id = mkId();
    return c;
  }).filter(c => c.name);
}

function parseJSON(text) {
  const arr = JSON.parse(text);
  if (!Array.isArray(arr)) throw new Error("JSON must be an array of objects.");
  return arr.map(row => {
    const c = {};
    KNOWN_COLS.forEach(k => { c[k] = String(row[k]||"").trim(); });
    if (!c.type || !["realtor","lawyer"].includes(c.type.toLowerCase())) c.type = "realtor";
    else c.type = c.type.toLowerCase();
    c.id = mkId();
    return c;
  }).filter(c => c.name);
}

/* ══════════════════════════════════════════════════════════════
   FIREBASE SETUP
══════════════════════════════════════════════════════════════ */
let db = null;
async function initFirebase(config) {
  try {
    if (firebase.apps.length) {
      await Promise.all(firebase.apps.map(app => app.delete()));
    }
    const app = firebase.initializeApp(config);
    db = firebase.database(app);
    return true;
  } catch(e) {
    console.error("Firebase init failed:", e);
    return false;
  }
}

async function saveToFirebase(sessionId, contacts) {
  if (!db) return;
  const payload = {};
  contacts.forEach(c => {
    const safeId = c.id.replace(/[.$#[\]/]/g,"_");
    payload[safeId] = {
      name: c.name, type: c.type, phone: c.phone, email: c.email,
      address: c.address, company: c.company, license: c.license,
      notes: c.notes||"", reviewed: c.reviewed||false, actioned: c.actioned||false,
      verification: c.verification || null,
      updatedAt: Date.now()
    };
  });
  await db.ref(`cv/${sessionId}`).update(payload);
}

async function loadFromFirebase(sessionId) {
  if (!db) return null;
  const snap = await db.ref(`cv/${sessionId}`).get();
  if (!snap.exists()) return null;
  const data = snap.val();
  return Object.entries(data).map(([id, c]) => ({ ...c, id }));
}

  useEffect(() => { const t = setTimeout(onDone, 3200); return ()=>clearTimeout(t); }, []);

}

/* ── Setup Wizard ── */
function SetupWizard({ onComplete }) {
  const [step, setStep] = useState(0);

  const [cfg, setCfg] = useState({ apiKey:"", authDomain:"", databaseURL:"", projectId:"" });

  async function proceed() {
    setErr("");
    if (mode === "demo") { onComplete(null); return; }
    if (!cfg.apiKey || !cfg.databaseURL) { setErr("API Key and Database URL are required."); return; }
    const ok = await initFirebase({
      apiKey: cfg.apiKey,
      authDomain: cfg.authDomain || `${cfg.projectId}.firebaseapp.com`,
      databaseURL: cfg.databaseURL,
      projectId: cfg.projectId
    });
    if (!ok) { setErr("Could not initialize Firebase — check your credentials."); return; }
    onComplete(`session-${Date.now()}`);
  }

  const STEPS = ["Welcome","Storage"];

  return (
    <div className="wizard si">
      <div className="progress-dots">
        {STEPS.map((_, i) => <div key={i} className={`progress-dot ${i<=step?"active":""}`} />)}

      {step === 0 && <>
        <div className="wizard-title">Contact Verifier</div>
        <div className="wizard-sub">

          of realtors and lawyers. Upload a CSV or JSON file and let the agent flag
          outdated or incorrect information — with photos when available.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
          {[
            { v:"demo",     icon:"⚡", title:"Demo Mode",        sub:"No setup — data stays in your browser" },
            { v:"firebase", icon:"🔥", title:"Firebase Mode",    sub:"Persist results to Firebase Realtime DB" }
          ].map(opt => (
            <div key={opt.v} onClick={()=>setMode(opt.v)}
              style={{border:`2px solid ${mode===opt.v?"var(--navy)":"var(--rule)"}`,borderRadius:8,padding:"14px 16px",cursor:"pointer",background:mode===opt.v?"var(--warm)":"#fff",transition:"all .18s"}}>
              <div style={{fontSize:"1.6rem"}}>{opt.icon}</div>
              <div style={{fontWeight:600,fontSize:".88rem",marginTop:4}}>{opt.title}</div>
              <div style={{fontSize:".75rem",color:"var(--muted)",marginTop:2}}>{opt.sub}</div>
            </div>
          ))}
        </div>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={()=>setStep(1)}>Continue →</button>
      </>}

      {step === 1 && <>
        <div className="wizard-title">{mode==="firebase" ? "Firebase Config" : "Ready to Start"}</div>
        {mode === "demo" ? <>
          <div className="wizard-sub">Demo mode is selected. Your verification results will be stored only in your browser's memory for this session.</div>
          <div className="wiz-note">
            ⚡ <strong>Demo mode limitations:</strong> data is lost on page refresh. Switch to Firebase mode to persist results across sessions.
          </div>
          <button className="btn btn-primary" style={{width:"100%",marginTop:20}} onClick={proceed}>Launch Verifier →</button>
        </> : <>
          <div className="wizard-sub">Enter your Firebase project credentials. These are only used client-side and never sent to any third-party server.</div>
          {["apiKey","authDomain","databaseURL","projectId"].map(k => (
            <div className="wiz-field" key={k}>
              <label>{k}</label>
              <input value={cfg[k]} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))} placeholder={
                k==="apiKey"?"AIza..."
                :k==="authDomain"?"your-project.firebaseapp.com"
                :k==="databaseURL"?"https://your-project-default-rtdb.firebaseio.com"
                :"your-project-id"
              } />
            </div>
          ))}
          {err && <div style={{color:"var(--red)",fontSize:".82rem",marginBottom:8}}>{err}</div>}
          <div className="wiz-note">

/* ── Main App ── */
function App() {
  const [sessionId, setSessionId] = useState(null);
  const [started, setStarted]     = useState(false);

  const [contacts,    setContacts]    = useState([]);
  const [processing,  setProcessing]  = useState(false);
  const [progress,    setProgress]    = useState({ done:0, total:0 });
  const [selected,    setSelected]    = useState(null); // detail panel
  const [toast,       setToast]       = useState(null);
  const [sortCol,     setSortCol]     = useState("name");
  const [sortDir,     setSortDir]     = useState("asc");
  const [filterText,  setFilterText]  = useState("");
  const [filterType,  setFilterType]  = useState("all");
  const [filterStatus,setFilterStatus]= useState("all");
  const [dragOver,    setDragOver]    = useState(false);
  const fileRef = useRef();
  const stopRef = useRef(false);

  function showToast(msg, type="info") {
    setToast({ msg, type, id: mkId() });
  }

  /* ── File handling ── */
  async function handleFile(file) {
    if (!file) return;
    try {
      const text = await file.text();
      let parsed;
      if (file.name.endsWith(".json")) {
        parsed = parseJSON(text);
      } else {
        parsed = parseCSV(text);
      }
      if (!parsed.length) throw new Error("No valid contacts found in file.");
      setContacts(parsed);
      showToast(`✓ Loaded ${parsed.length} contacts`, "success");
    } catch(e) {
      showToast(`Parse error: ${e.message}`, "error");
    }
  }

  function handleDrop(e) {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }

  function loadSampleData() {
    const contacts = SAMPLE_CONTACTS.map(c => ({ ...c, id:mkId(), notes:"", reviewed:false, actioned:false }));
    setContacts(contacts);
    showToast("✓ Loaded 6 sample contacts", "success");
  }

  /* ── Batch Verification ── */
  async function runVerification() {
    const unverified = contacts.filter(c => !c.verification);
    if (!unverified.length) { showToast("All contacts already verified.", "info"); return; }
    setProcessing(true);
    stopRef.current = false;
    setProgress({ done:0, total:unverified.length });

    let updated = [...contacts];
    for (let i=0; i<unverified.length; i++) {
      if (stopRef.current) break;
      const c = unverified[i];
      try {
        const v = await verifyContact(c);
        updated = updated.map(u => u.id === c.id ? { ...u, verification:v } : u);
        setContacts([...updated]);
        setProgress({ done:i+1, total:unverified.length });
      } catch(e) {
        updated = updated.map(u => u.id === c.id
          ? { ...u, verification:{ email:{status:"uncertain",note:"Error"}, phone:{status:"uncertain",note:"Error"}, address:{status:"uncertain",note:"Error"}, overall:"uncertain", photoUrl:null, photoSrc:"" } }
          : u);
        setContacts([...updated]);
      }
    }

    if (sessionId) {
      try { await saveToFirebase(sessionId, updated); } catch(e) { console.warn("Firebase save failed:", e); }
    }
    setProcessing(false);
    showToast("✓ Verification complete!", "success");
  }

  function stopVerification() {
    stopRef.current = true;
    setProcessing(false);
  }

  /* ── Update contact ── */
  function updateContact(updated) {
    const next = contacts.map(c => c.id === updated.id ? updated : c);
    setContacts(next);
    if (sessionId) saveToFirebase(sessionId, next).catch(()=>{});
    showToast("✓ Contact saved", "success");
  }

  /* ── Sort & Filter ── */
  const displayed = useMemo(() => {
    let list = [...contacts];
    if (filterText) {
      const q = filterText.toLowerCase();
      list = list.filter(c =>
        [c.name,c.email,c.phone,c.address,c.company].some(v => String(v||"").toLowerCase().includes(q))
      );
    }
    if (filterType !== "all") list = list.filter(c => c.type === filterType);
    if (filterStatus !== "all") {
      list = list.filter(c => {
        const ov = c.verification?.overall;
        if (filterStatus === "pending")  return !ov;
        return ov === filterStatus;
      });
    }
    list.sort((a,b) => {
      let av = a[sortCol] || (a.verification?.overall||"");
      let bv = b[sortCol] || (b.verification?.overall||"");
      if (sortCol === "status") { av = a.verification?.overall||"pending"; bv = b.verification?.overall||"pending"; }
      const cmp = String(av).localeCompare(String(bv));
      return sortDir === "asc" ? cmp : -cmp;
    });
    return list;
  }, [contacts, filterText, filterType, filterStatus, sortCol, sortDir]);

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => d==="asc"?"desc":"asc");
    else { setSortCol(col); setSortDir("asc"); }
  }
  function sortIcon(col) {
    if (sortCol !== col) return " ↕";
    return sortDir === "asc" ? " ↑" : " ↓";
  }

  /* ── Stats ── */
  const stats = useMemo(() => {
    const verified  = contacts.filter(c => c.verification?.overall==="verified").length;
    const outdated  = contacts.filter(c => c.verification?.overall==="outdated").length;
    const uncertain = contacts.filter(c => c.verification?.overall==="uncertain").length;
    const pending   = contacts.filter(c => !c.verification).length;
    const reviewed  = contacts.filter(c => c.reviewed).length;
    const pct = contacts.length ? Math.round((verified/contacts.length)*100) : 0;
    return { total:contacts.length, verified, outdated, uncertain, pending, reviewed, pct };
  }, [contacts]);

  /* ── Wizard complete ── */
  function handleWizardComplete(sid) {
    setSessionId(sid);
    setStarted(true);
    if (sid) {
      loadFromFirebase(sid).then(data => {
        if (data && data.length) { setContacts(data); showToast(`✓ Restored ${data.length} contacts from Firebase`, "success"); }
      }).catch(()=>{});
    }
  }

  /* ══ RENDER: Setup Wizard ══ */
  if (!started) {
    return (
      <div className="app">
        <div className="topbar">
          <div className="topbar-brand">
            <span>🔍</span>
            <div>
              <div>Contact Verifier</div>
              <div className="topbar-sub">Realtor &amp; Lawyer Database</div>
            </div>
          </div>
        </div>
        <div className="main">
          <SetupWizard onComplete={handleWizardComplete} />
        </div>
        {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)} />}
      </div>
    );
  }

  /* ══ RENDER: Main Dashboard ══ */
  return (
    <div className="app">
      {/* Topbar */}
      <div className="topbar">
        <div className="topbar-brand">
          <span>🔍</span>
          <div>
            <div>Contact Verifier</div>
            <div className="topbar-sub">Realtor &amp; Lawyer Database</div>
          </div>
        </div>
        <div className="topbar-right">
          {sessionId && <span style={{fontSize:".72rem",opacity:.5}}>🔥 Firebase</span>}
          {contacts.length > 0 && (
            <button className="btn btn-ghost" style={{fontSize:".78rem",padding:"6px 12px",color:"#fff",borderColor:"rgba(255,255,255,.2)"}}
              onClick={()=>exportCSV(contacts)}>
              ⬇ Export CSV
            </button>
          )}
        </div>
      </div>

      <div className="main">

        {/* ── Stats Row ── */}
        {contacts.length > 0 && (
          <div className="stats-row si">
            <div className="stat-box">
              <div className="stat-num">{stats.total}</div>
              <div className="stat-lbl">Total Contacts</div>
            </div>
            <div className="stat-box green">
              <div className="stat-num">{stats.verified}</div>
              <div className="stat-lbl">✓ Verified</div>
            </div>
            <div className="stat-box red">
              <div className="stat-num">{stats.outdated}</div>
              <div className="stat-lbl">✗ Needs Update</div>
            </div>
            <div className="stat-box amber">
              <div className="stat-num">{stats.uncertain}</div>
              <div className="stat-lbl">? Uncertain</div>
            </div>
            <div className="stat-box">
              <div className="stat-num">{stats.pending}</div>
              <div className="stat-lbl">⋯ Pending</div>
            </div>
            <div className="stat-box">
              <div className="stat-num">{stats.pct}%</div>
              <div className="stat-lbl">Verified Rate</div>
            </div>
          </div>
        )}

        {/* ── Upload Card ── */}
        <div className="card si">
          <div className="card-title"><span>📤</span> Import Contacts</div>
          <div
            className={`upload-zone ${dragOver?"dragover":""}`}
            onClick={()=>fileRef.current.click()}
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}

            onDrop={handleDrop}
          >

            ) : (
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                <button className="btn btn-primary" onClick={runVerification}
                  disabled={!contacts.filter(c=>!c.verification).length}>
                  ▶ Verify {contacts.filter(c=>!c.verification).length} Pending Contacts
                </button>
                {contacts.some(c=>c.verification) && (
                  <button className="btn btn-ghost" onClick={()=>{
                    if(window.confirm("Re-verify all contacts (clears existing results)?")) {
                      setContacts(contacts.map(c=>({...c,verification:undefined})));
                    }
                  }}>↺ Re-verify All</button>
                )}
                <span style={{fontSize:".8rem",color:"var(--muted)"}}>
                  {stats.verified} verified · {stats.outdated} need updates · {stats.uncertain} uncertain · {stats.pending} pending
                </span>
              </div>
            )}

            {contacts.length > 0 && stats.pending < contacts.length && (
              <div style={{marginTop:12}}>
                <div className="prog-bar-wrap">
                  <div className="prog-bar green" style={{width:`${stats.pct}%`}} />
                </div>
                <div style={{fontSize:".75rem",color:"var(--muted)",marginTop:4}}>{stats.pct}% verified</div>
              </div>
            )}

            <div className="wiz-note" style={{marginTop:14}}>
              ℹ️ <strong>How verification works:</strong> The engine validates email format and domain, phone number format and area code, and address completeness. 
              Photos are retrieved via avatar service (real LinkedIn/Google photo lookup requires API keys — see documentation).
              For production use, connect a dedicated email verification API (e.g., ZeroBounce, NeverBounce) and phone lookup service (e.g., Twilio, NumVerify).
            </div>
          </div>
        )}

        {/* ── Results Table ── */}
        {contacts.length > 0 && (
          <div className="card si">
            <div className="card-title"><span>📊</span> Results · {displayed.length} of {contacts.length} contacts</div>

            {/* Filters */}
            <div className="filter-row">
              <input value={filterText} onChange={e=>setFilterText(e.target.value)}
                placeholder="🔍 Search name, email, phone…" />
              <select value={filterType} onChange={e=>setFilterType(e.target.value)}>
                <option value="all">All Types</option>
                <option value="realtor">Realtors</option>
                <option value="lawyer">Lawyers</option>
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
                <option value="all">All Statuses</option>
                <option value="verified">✓ Verified</option>
                <option value="outdated">✗ Needs Update</option>
                <option value="uncertain">? Uncertain</option>
                <option value="pending">⋯ Pending</option>
              </select>
              {(filterText||filterType!=="all"||filterStatus!=="all") && (
                <button className="btn btn-ghost" style={{fontSize:".78rem",padding:"6px 12px"}}
                  onClick={()=>{setFilterText("");setFilterType("all");setFilterStatus("all");}}>✕ Clear</button>
              )}
              <button className="btn btn-ghost" style={{marginLeft:"auto",fontSize:".78rem",padding:"6px 12px"}}
                onClick={()=>exportCSV(contacts)}>⬇ Export CSV</button>
            </div>

            {displayed.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">🔍</div>
                <div className="empty-title">No contacts match your filters</div>
                <div className="empty-sub">Try clearing the search or filter</div>
              </div>
            ) : (
              <div className="tbl-wrap">
                <table>
                  <thead>
                    <tr>
                      <th style={{width:52}}>Photo</th>
                      <th onClick={()=>toggleSort("name")}>Name{sortIcon("name")}</th>
                      <th onClick={()=>toggleSort("type")}>Type{sortIcon("type")}</th>
                      <th onClick={()=>toggleSort("phone")}>Phone{sortIcon("phone")}</th>
                      <th onClick={()=>toggleSort("email")}>Email{sortIcon("email")}</th>
                      <th>Address</th>
                      <th onClick={()=>toggleSort("status")}>Status{sortIcon("status")}</th>
                      <th>Notes</th>
                      <th style={{width:80}}>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {displayed.map(c => {
                      const v = c.verification;
                      return (
                        <tr key={c.id}>
                          <td><Avatar contact={c} size={40} /></td>
                          <td>
                            <div className="td-name">{c.name}</div>
                            {c.company && <div className="td-muted" style={{fontSize:".75rem"}}>{c.company}</div>}
                            {c.reviewed && <span className="badge-reviewed" style={{marginTop:3,display:"inline-block"}}>★ Reviewed</span>}
                            {c.actioned && <span className="badge-actioned" style={{marginTop:3,display:"inline-block",marginLeft:3}}>✓ Actioned</span>}
                          </td>
                          <td><span className={`td-type ${c.type}`}>{c.type}</span></td>
                          <td>
                            <div style={{fontSize:".82rem"}}>{c.phone || <span className="td-muted">—</span>}</div>
                            {v && <div style={{fontSize:".7rem",color:v.phone?.status==="verified"?"var(--green)":v.phone?.status==="outdated"?"var(--red)":"var(--amber)",marginTop:2}}>
                              {v.phone?.status==="verified"?"✓":v.phone?.status==="outdated"?"✗":"?"} {v.phone?.status}
                            </div>}
                          </td>
                          <td style={{maxWidth:180}}>
                            <div style={{fontSize:".82rem",wordBreak:"break-all"}}>{c.email || <span className="td-muted">—</span>}</div>
                            {v && <div style={{fontSize:".7rem",color:v.email?.status==="verified"?"var(--green)":v.email?.status==="outdated"?"var(--red)":"var(--amber)",marginTop:2}}>
                              {v.email?.status==="verified"?"✓":v.email?.status==="outdated"?"✗":"?"} {v.email?.status}
                            </div>}
                          </td>
                          <td style={{maxWidth:180}}>
                            <div style={{fontSize:".8rem",color:"var(--muted)"}}>{c.address || "—"}</div>
                            {v && <div style={{fontSize:".7rem",color:v.address?.status==="verified"?"var(--green)":v.address?.status==="outdated"?"var(--red)":"var(--amber)",marginTop:2}}>
                              {v.address?.status==="verified"?"✓":v.address?.status==="outdated"?"✗":"?"} {v.address?.status}
                            </div>}
                          </td>
                          <td>
                            {v ? <StatusBadge status={v.overall} /> : <StatusBadge status="pending" />}
                          </td>
                          <td className="td-notes">
                            <textarea
                              value={c.notes||""}
                              onChange={e=>{ const next=contacts.map(x=>x.id===c.id?{...x,notes:e.target.value}:x); setContacts(next); }}
                              onBlur={()=>{ if(sessionId) saveToFirebase(sessionId,contacts).catch(()=>{}); }}
                              placeholder="Notes…"
                              rows={2}
                            />
                          </td>
                          <td>
                            <button className="btn btn-ghost" style={{padding:"5px 10px",fontSize:".75rem"}}
                              onClick={()=>setSelected(c)}>
                              View →
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* ── Empty State (no contacts) ── */}
        {contacts.length === 0 && (
          <div className="card si">
            <div className="empty-state">
              <div className="empty-icon">📋</div>
              <div className="empty-title">No contacts loaded</div>
              <div className="empty-sub">Upload a CSV or JSON file above, or load sample data to get started.</div>
              <button className="btn btn-primary" style={{marginTop:16}} onClick={loadSampleData}>
                Try Sample Data →
              </button>
            </div>
          </div>
        )}

      </div>{/* /main */}

      {/* Detail Panel */}
      {selected && (
        <DetailPanel
          contact={selected}
          onClose={()=>setSelected(null)}
          onUpdate={c=>{ updateContact(c); setSelected(null); }}
        />
      )}

      {/* Toast */}
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
